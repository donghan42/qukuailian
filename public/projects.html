<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>项目列表 - 众筹宝</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .filter-bar {
      background: white;
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
    }
    .search-input {
      flex: 1;
      min-width: 200px;
      padding: 10px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
    }
    .filter-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filter-tag {
      padding: 6px 14px;
      border-radius: 999px;
      background: var(--gray-100);
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
      border: 1.5px solid transparent;
    }
    .filter-tag:hover { background: var(--gray-200); }
    .filter-tag.active {
      background: var(--primary);
      color: white;
    }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <div class="container">
    <h1 class="text-2xl text-bold mb-3">浏览众筹项目</h1>

    <div class="filter-bar">
      <input type="text" id="search-input" class="search-input" placeholder="🔍 搜索项目名称或描述...">
      <select id="sort-select" class="form-control" style="width:auto;min-width:140px">
        <option value="new">最新发布</option>
        <option value="hot">最热门</option>
        <option value="ending">即将结束</option>
      </select>
    </div>

    <div class="filter-bar" style="padding:12px 20px">
      <span class="text-sm text-bold">分类：</span>
      <div class="filter-tags" id="category-tags">
        <span class="filter-tag active" data-category="">全部</span>
        <span class="filter-tag" data-category="科技产品">科技产品</span>
        <span class="filter-tag" data-category="影视艺术">影视艺术</span>
        <span class="filter-tag" data-category="环保公益">环保公益</span>
        <span class="filter-tag" data-category="文化创意">文化创意</span>
        <span class="filter-tag" data-category="其他">其他</span>
      </div>
    </div>

    <div class="project-grid" id="project-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px">
      <div class="empty-state" style="grid-column:1/-1">
        <div class="loading"></div>
      </div>
    </div>

    <div class="flex justify-between items-center mt-3" id="pagination"></div>
  </div>

  <footer class="footer">
    <p>🪙 区块链众筹系统 - 基于以太坊智能合约</p>
  </footer>

  <script src="/js/app.js"></script>
  <script src="/js/blockchain.js"></script>
  <script>
    renderNavbar('projects');

    let currentPage = 1;
    let currentCategory = '';
    let currentKeyword = '';
    let currentSort = 'new';

    function projectCardHTML(p) {
      const percent = Math.min(100, (parseFloat(p.currentAmount) / parseFloat(p.goalAmount) * 100)).toFixed(0);
      const days = Math.max(0, Math.ceil((new Date(p.deadline) - new Date()) / (1000 * 60 * 60 * 24)));
      const colors = ['6366f1', '8b5cf6', '06b6d4', '10b981', 'f59e0b', 'ef4444', 'ec4899'];
      const c1 = colors[p.id % colors.length];
      const c2 = colors[(p.id + 3) % colors.length];
      return `
        <a href="/project-detail.html?id=${p.id}" class="card" style="text-decoration:none;color:inherit;display:block;padding:0;overflow:hidden">
          <div style="height:160px;background:linear-gradient(135deg,#${c1},#${c2});display:flex;align-items:center;justify-content:center;font-size:48px;color:white">
            🎯
          </div>
          <div style="padding:20px">
            <div class="flex items-center gap-1 mb-1">
              <span class="badge badge-primary">${p.category || '其他'}</span>
              ${statusBadge(p.status)}
            </div>
            <h3 style="font-size:16px;font-weight:700;margin-bottom:8px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${p.title}</h3>
            <p class="text-muted text-sm mb-2" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${p.description || ''}</p>
            <div class="progress mb-1"><div class="progress-bar" style="width:${percent}%"></div></div>
            <div class="flex justify-between text-sm mb-2">
              <span class="text-bold text-primary">${formatETH(p.currentAmount)}</span>
              <span class="text-muted">${percent}%</span>
            </div>
            <div class="flex justify-between text-sm text-muted">
              <span>目标 ${formatETH(p.goalAmount)}</span>
              <span>${days > 0 ? days + '天剩余' : '已结束'}</span>
            </div>
          </div>
        </a>
      `;
    }

    async function loadProjects() {
      const grid = document.getElementById('project-grid');
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="loading"></div></div>';

      const res = await api.listProjects({
        page: currentPage,
        pageSize: 12,
        category: currentCategory,
        keyword: currentKeyword,
        sort: currentSort
      });

      if (res.code === 0) {
        if (res.data.list.length === 0) {
          grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">📦</div><div class="empty-state-text">暂无符合条件的项目</div></div>';
        } else {
          grid.innerHTML = res.data.list.map(projectCardHTML).join('');
        }
        renderPagination(res.data.total);
      } else {
        grid.innerHTML = '<div class="alert alert-danger" style="grid-column:1/-1">加载失败：' + (res.message || '') + '</div>';
      }
    }

    function renderPagination(total) {
      const totalPages = Math.ceil(total / 12);
      const el = document.getElementById('pagination');
      if (totalPages <= 1) { el.innerHTML = `<span class="text-muted text-sm">共 ${total} 个项目</span><span></span>`; return; }
      el.innerHTML = `
        <span class="text-muted text-sm">共 ${total} 个项目 · 第 ${currentPage} / ${totalPages} 页</span>
        <div class="flex gap-1">
          <button class="btn btn-secondary btn-sm" ${currentPage <= 1 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})">上一页</button>
          <button class="btn btn-secondary btn-sm" ${currentPage >= totalPages ? 'disabled' : ''} onclick="goPage(${currentPage + 1})">下一页</button>
        </div>
      `;
    }

    window.goPage = (p) => { currentPage = p; loadProjects(); window.scrollTo(0, 0); };

    // 搜索
    let searchTimer;
    document.getElementById('search-input').addEventListener('input', (e) => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        currentKeyword = e.target.value.trim();
        currentPage = 1;
        loadProjects();
      }, 400);
    });

    // 排序
    document.getElementById('sort-select').addEventListener('change', (e) => {
      currentSort = e.target.value;
      currentPage = 1;
      loadProjects();
    });

    // 分类
    document.querySelectorAll('#category-tags .filter-tag').forEach(tag => {
      tag.addEventListener('click', () => {
        document.querySelectorAll('#category-tags .filter-tag').forEach(t => t.classList.remove('active'));
        tag.classList.add('active');
        currentCategory = tag.dataset.category;
        currentPage = 1;
        loadProjects();
      });
    });

    loadProjects();
  </script>
</body>
</html>
