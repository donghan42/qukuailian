<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>发起项目 - 众筹宝</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .form-card { max-width: 720px; margin: 0 auto; }
    .tip-box {
      background: linear-gradient(135deg, #eff6ff, #e0e7ff);
      border-left: 4px solid var(--primary);
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      font-size: 14px;
      color: var(--gray-700);
    }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <div class="container">
    <div class="form-card">
      <h1 class="text-2xl text-bold mb-1">发起众筹项目</h1>
      <p class="text-muted mb-3">填写项目信息，部署到区块链上开启众筹</p>

      <div class="tip-box">
        💡 <strong>链上部署</strong>：项目信息将记录到区块链上，公开透明、不可篡改。无需 Gas 费（模拟模式）。
      </div>

      <form id="create-form" class="card">
        <div class="form-group">
          <label class="form-label">项目标题 <span class="text-danger">*</span></label>
          <input type="text" name="title" class="form-control" required maxlength="200" placeholder="给你的项目起个吸引人的名字">
        </div>

        <div class="form-group">
          <label class="form-label">项目分类</label>
          <select name="category" class="form-control">
            <option value="科技产品">科技产品</option>
            <option value="影视艺术">影视艺术</option>
            <option value="环保公益">环保公益</option>
            <option value="文化创意">文化创意</option>
            <option value="其他">其他</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">项目描述 <span class="text-danger">*</span></label>
          <textarea name="description" class="form-control" rows="6" required placeholder="详细介绍你的项目，包括：项目背景、目标、计划、资金用途等"></textarea>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div class="form-group">
            <label class="form-label">目标金额 (ETH) <span class="text-danger">*</span></label>
            <input type="number" name="goal_amount" class="form-control" required min="0.001" step="0.001" placeholder="例如: 5">
            <div class="form-hint">达到此金额项目视为成功</div>
          </div>

          <div class="form-group">
            <label class="form-label">众筹周期 (天)</label>
            <input type="number" name="duration_days" class="form-control" min="1" max="365" value="30">
            <div class="form-hint">建议 7-90 天</div>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-btn">
          🚀 部署到区块链
        </button>
      </form>
    </div>
  </div>

  <footer class="footer">
    <p>🪙 区块链众筹系统</p>
  </footer>

  <script src="/js/app.js"></script>
  <script>
    renderNavbar('create');

    if (!Auth.isLoggedIn()) {
      showToast('请先登录', 'warning');
      setTimeout(() => location.href = '/login.html', 800);
    }

    document.getElementById('create-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const data = Object.fromEntries(fd);

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span> 正在部署到区块链...';

      await new Promise(r => setTimeout(r, 1200));

      const res = await api.createProject({
        creator: Auth.getAddress(),
        title: data.title,
        description: data.description,
        category: data.category,
        goalAmount: parseFloat(data.goal_amount),
        durationSeconds: parseInt(data.duration_days) * 24 * 3600
      });

      if (res.code === 0) {
        showToast('🎉 项目已成功部署到区块链！', 'success');
        setTimeout(() => location.href = `/project-detail.html?id=${res.data.id}`, 800);
      } else {
        showToast(res.message, 'danger');
        btn.disabled = false;
        btn.innerHTML = '🚀 部署到区块链';
      }
    });
  </script>
</body>
</html>
