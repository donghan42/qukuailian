<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心 - 众筹宝</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .profile-header {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      padding: 32px;
      border-radius: var(--radius-lg);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    .big-avatar {
      width: 80px; height: 80px; border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; font-weight: 700; color: white;
    }
    .stat-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-mini {
      background: white;
      padding: 16px;
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
    }
    .stat-mini-num { font-size: 28px; font-weight: 800; color: var(--primary); }
    .stat-mini-label { color: var(--text-muted); font-size: 13px; }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <div class="container" id="app">
    <div class="text-center"><div class="loading"></div></div>
  </div>

  <footer class="footer">
    <p>🪙 区块链众筹系统</p>
  </footer>

  <script src="/js/app.js"></script>
  <script>
    renderNavbar('profile');

    if (!Auth.isLoggedIn()) {
      showToast('请先登录', 'warning');
      setTimeout(() => location.href = '/login.html', 800);
    }

    async function load() {
      const address = Auth.getAddress();
      const [profileRes, myProjectsRes, myDonationsRes, balanceRes] = await Promise.all([
        api.getProfile(address),
        api.projectsByCreator(address),
        api.myDonations(address),
        api.getBalance(address)
      ]);

      if (profileRes.code !== 0) {
        document.getElementById('app').innerHTML = '<div class="alert alert-danger">加载失败</div>';
        return;
      }

      const u = profileRes.data;
      const projects = myProjectsRes.data.list || [];
      const donations = myDonationsRes.data || [];
      const balance = balanceRes.data.balance;

      const totalRaised = projects.reduce((s, p) => s + parseFloat(p.currentAmount || 0), 0);
      const totalDonated = donations.filter(d => !d.refunded).reduce((s, d) => s + parseFloat(d.amount), 0);
      const successCount = projects.filter(p => p.status === 1).length;

      document.getElementById('app').innerHTML = `
        <div class="profile-header">
          <div class="big-avatar">${(u.username || '?')[0].toUpperCase()}</div>
          <div style="flex:1;min-width:200px">
            <h1 style="font-size:28px;font-weight:800;margin-bottom:4px">${u.username}</h1>
            <div style="opacity:0.9">${u.realName || '未设置真实姓名'} · ${u.email || '未绑定邮箱'}</div>
            <div style="opacity:0.85;margin-top:6px;font-size:13px;font-family:monospace">${formatAddress(u.address, 10, 8)}</div>
            <div style="opacity:0.85;margin-top:4px;font-size:13px">注册于 ${formatTime(u.createdAt)}</div>
          </div>
          <div style="text-align:right">
            <div style="opacity:0.85;font-size:13px">链上余额</div>
            <div style="font-size:28px;font-weight:800">${balance.toFixed(4)} ETH</div>
            <button class="btn mt-1" style="background:rgba(255,255,255,0.2);color:white" onclick="faucet()">🚰 领取测试币</button>
          </div>
        </div>

        <div class="stat-row">
          <div class="stat-mini">
            <div class="stat-mini-num">${projects.length}</div>
            <div class="stat-mini-label">发起项目</div>
          </div>
          <div class="stat-mini">
            <div class="stat-mini-num" style="color:var(--success)">${successCount}</div>
            <div class="stat-mini-label">众筹成功</div>
          </div>
          <div class="stat-mini">
            <div class="stat-mini-num" style="color:var(--accent)">${totalRaised.toFixed(3)}</div>
            <div class="stat-mini-label">累计筹集 ETH</div>
          </div>
          <div class="stat-mini">
            <div class="stat-mini-num" style="color:var(--warning)">${donations.length}</div>
            <div class="stat-mini-label">参与捐赠</div>
          </div>
          <div class="stat-mini">
            <div class="stat-mini-num">${totalDonated.toFixed(3)}</div>
            <div class="stat-mini-label">累计捐赠 ETH</div>
          </div>
        </div>

        <div class="tabs">
          <button class="tab active" data-tab="my-projects">我发起的项目</button>
          <button class="tab" data-tab="my-donations">我的捐赠</button>
          <button class="tab" data-tab="settings">账号设置</button>
        </div>

        <div id="tab-my-projects" class="tab-panel">
          ${projects.length === 0
            ? '<div class="card empty-state"><div class="empty-state-icon">📦</div><div class="empty-state-text">还没有发起项目</div><a href="/create-project.html" class="btn btn-primary mt-2">立即发起</a></div>'
            : `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px">${projects.map(p => `
              <a href="/project-detail.html?id=${p.id}" class="card" style="text-decoration:none;color:inherit;display:block">
                <div class="flex items-center justify-between mb-1">
                  <span class="badge badge-primary">${p.category || '其他'}</span>
                  ${statusBadge(p.status)}
                </div>
                <h3 style="font-weight:700;margin-bottom:8px">${p.title}</h3>
                <div class="text-muted text-sm">目标 ${formatETH(p.goalAmount)} · 已筹集 <span class="text-primary text-bold">${formatETH(p.currentAmount)}</span></div>
                <div class="text-muted text-sm">${p.donor_count || 0} 位支持者</div>
              </a>
            `).join('')}</div>`
          }
        </div>

        <div id="tab-my-donations" class="tab-panel" style="display:none">
          ${donations.length === 0
            ? '<div class="card empty-state"><div class="empty-state-icon">💝</div><div class="empty-state-text">还没有捐赠记录</div><a href="/projects.html" class="btn btn-primary mt-2">浏览项目</a></div>'
            : `<div class="card" style="padding:0">${donations.map(d => `
              <a href="/project-detail.html?id=${d.projectId}" style="display:flex;align-items:center;gap:16px;padding:16px;border-bottom:1px solid var(--border);text-decoration:none;color:inherit">
                <div style="width:48px;height:48px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;color:white">💝</div>
                <div style="flex:1">
                  <div class="text-bold">${d.project_title || '项目 #' + d.projectId}</div>
                  <div class="text-muted text-sm">${formatTime(d.timestamp)}</div>
                  <div class="text-muted text-sm" style="font-family:monospace">${formatAddress(d.tx_hash, 10, 8)}</div>
                </div>
                <div class="text-right">
                  <div class="text-bold text-primary">${formatETH(d.amount)}</div>
                  <div>${d.refunded ? '<span class="badge badge-warning">已退款</span>' : '<span class="badge badge-success">成功</span>'}</div>
                </div>
              </a>
            `).join('')}</div>`
          }
        </div>

        <div id="tab-settings" class="tab-panel" style="display:none">
          <div class="card" style="max-width:600px">
            <h2 class="text-xl text-bold mb-2">账号信息</h2>
            <form id="settings-form">
              <div class="form-group">
                <label class="form-label">用户名</label>
                <input type="text" class="form-control" value="${u.username}" disabled>
              </div>
              <div class="form-group">
                <label class="form-label">真实姓名</label>
                <input type="text" name="realName" class="form-control" value="${u.realName || ''}">
              </div>
              <div class="form-group">
                <label class="form-label">邮箱</label>
                <input type="email" name="email" class="form-control" value="${u.email || ''}">
              </div>
              <div class="form-group">
                <label class="form-label">手机号</label>
                <input type="tel" name="phone" class="form-control" value="${u.phone || ''}">
              </div>
              <div class="form-group">
                <label class="form-label">链上钱包地址</label>
                <input type="text" class="form-control" value="${u.address}" disabled style="font-family:monospace;font-size:12px">
                <div class="form-hint">钱包地址由系统自动生成，与您的账户绑定</div>
              </div>
              <button type="submit" class="btn btn-primary">保存修改</button>
            </form>
          </div>
        </div>
      `;

      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
          document.getElementById('tab-' + tab.dataset.tab).style.display = '';
        });
      });

      document.getElementById('settings-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const data = Object.fromEntries(fd);
        const res = await api.updateProfile({ address: Auth.getAddress(), ...data });
        if (res.code === 0) {
          showToast('保存成功', 'success');
          setTimeout(load, 600);
        } else {
          showToast(res.message, 'danger');
        }
      });
    }

    load();
  </script>
</body>
</html>
