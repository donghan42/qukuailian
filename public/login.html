<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 / 注册 - 众筹宝</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .auth-container {
      min-height: calc(100vh - 80px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    }
    .auth-card {
      background: white;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-xl);
      padding: 40px;
      width: 100%;
      max-width: 480px;
    }
    .auth-title {
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .auth-subtitle { text-align: center; color: var(--text-muted); margin-bottom: 24px; }
    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 16px;
      font-size: 13px;
    }
    .alert-info { background: #eff6ff; color: #1e40af; border-left: 4px solid var(--primary); }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <div class="auth-container">
    <div class="auth-card">
      <h1 class="auth-title">欢迎来到众筹宝</h1>
      <p class="auth-subtitle">基于区块链的众筹平台 · 纯链上模式</p>

      <div class="alert alert-info">
        💡 <strong>无需 MetaMask</strong>：系统会自动为您生成专属的模拟钱包地址，体验完整区块链功能。
      </div>

      <h2 style="font-size:20px;font-weight:700;margin-bottom:16px">📝 用户注册</h2>
      <form id="register-form">
        <div class="form-group">
          <label class="form-label">用户名 <span class="text-danger">*</span></label>
          <input type="text" name="username" class="form-control" placeholder="3-20个字符" required minlength="3" maxlength="20">
        </div>
        <div class="form-group">
          <label class="form-label">真实姓名</label>
          <input type="text" name="realName" class="form-control" placeholder="可选，便于项目方联系">
        </div>
        <div class="form-group">
          <label class="form-label">邮箱</label>
          <input type="email" name="email" class="form-control" placeholder="可选">
        </div>
        <div class="form-group">
          <label class="form-label">手机号</label>
          <input type="tel" name="phone" class="form-control" placeholder="可选">
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-btn">
          ✨ 注册并自动生成钱包
        </button>
        <p class="text-center text-sm text-muted mt-2">注册即视为同意服务条款</p>
      </form>

      <div style="margin-top:24px;padding-top:24px;border-top:1px solid var(--border)">
        <h3 style="font-size:14px;font-weight:600;margin-bottom:8px">🚀 快速体验（使用预置账户）</h3>
        <p class="text-sm text-muted mb-2">点击下方按钮一键登录预置用户：</p>
        <div id="quick-login-list" class="flex gap-1" style="flex-wrap:wrap"></div>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    renderNavbar('');

    // 加载快速登录用户
    api.demoUsers().then(r => {
      if (r.code === 0) {
        const el = document.getElementById('quick-login-list');
        el.innerHTML = r.data.users.map(u => `
          <button class="btn btn-outline btn-sm" onclick="quickLogin('${u.address}','${u.username}')">
            ${u.username} <span class="text-muted text-sm">(${u.balance.toFixed(1)} ETH)</span>
          </button>
        `).join('');
      }
    });

    async function quickLogin(address, username) {
      Auth.setAddress(address);
      Auth.setUser({ username, address });
      showToast('已登录 ' + username, 'success');
      setTimeout(() => location.href = '/', 600);
    }

    // 注册
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span> 注册中...';

      // 1. 生成钱包地址（SHA256 模拟）
      const enc = new TextEncoder();
      const data = enc.encode(fd.get('username') + Date.now() + Math.random());
      const hashBuf = await crypto.subtle.digest('SHA-256', data);
      const hashArr = Array.from(new Uint8Array(hashBuf));
      const hex = hashArr.map(b => b.toString(16).padStart(2, '0')).join('');
      const address = '0x' + hex.slice(0, 40);

      const res = await api.register({
        address,
        username: fd.get('username'),
        realName: fd.get('realName'),
        email: fd.get('email'),
        phone: fd.get('phone')
      });

      if (res.code === 0) {
        Auth.setAddress(address);
        Auth.setUser({ username: fd.get('username'), address });
        showToast('🎉 注册成功！钱包已自动生成', 'success');
        setTimeout(() => location.href = '/', 800);
      } else {
        showToast(res.message || '注册失败', 'danger');
        btn.disabled = false;
        btn.textContent = '✨ 注册并自动生成钱包';
      }
    });

    if (Auth.isLoggedIn()) {
      // 已登录直接跳转
      setTimeout(() => location.href = '/', 100);
    }
  </script>
</body>
</html>
